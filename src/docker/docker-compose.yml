version: "3.9"

services:
  agent:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile
    container_name: zhisaotong-agent
    ports:
      - "8501:8501"
    environment:
      - AMAP_KEY=${AMAP_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    restart: unless-stopped
